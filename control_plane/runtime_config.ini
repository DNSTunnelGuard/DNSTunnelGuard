[analyzer]
sus_percentage_threshold = 1.0
use_blacklist = true

[logging]
level = DEBUG
output = stdout

[entropyanalyzer]
enabled = true
weight_percentage = 0.2
max_entropy = 3.5

[trafficanalyzer]
enabled = false
weight_percentage = 1.0
minute_difference_threshold = 120
num_queries_threshold = 5

[mlanalyzer]
enabled = false
weight_percentage = 1.0
apiurl = http://localhost:3000





